name: Deploy to IIS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest changes
        shell: powershell
        run: |
          Set-Location "C:\inetpub\wwwroot\tekeche"
          git config --global --add safe.directory "C:/inetpub/wwwroot/tekeche"
          git pull origin main
          Write-Host "Deploy complete at $(Get-Date)"
