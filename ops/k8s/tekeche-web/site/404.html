<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page introuvable — Tekeche</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #1A1A2E;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .logo { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800; color: #E8701A; margin-bottom: 3rem; }
    .code { font-family: 'Syne', sans-serif; font-size: 7rem; font-weight: 800; color: #E8701A; line-height: 1; }
    h1 { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 700; margin: 1rem 0 0.75rem; }
    p { color: rgba(255,255,255,0.6); font-size: 1.05rem; max-width: 400px; line-height: 1.6; }
    a.btn {
      display: inline-block;
      margin-top: 2rem;
      background: #E8701A;
      color: #fff;
      padding: 14px 32px;
      border-radius: 50px;
      font-weight: 500;
      font-size: 1rem;
      text-decoration: none;
      transition: background 0.2s;
    }
    a.btn:hover { background: #B85510; }
  </style>
</head>
<body>
  <div class="logo">Tekeche</div>
  <div class="code">404</div>
  <h1>Page introuvable</h1>
  <p>La page que vous cherchez n'existe pas ou a été déplacée.</p>
  <a href="/" class="btn">← Retour à l'accueil</a>
</body>
</html>
