## Mirrors tekeche.com's live IIS web.config rewrite rules (checked 2026-07-18):
## - /privacy and /delete-account aliases
## - custom 404/500 pages
## HTTP->HTTPS redirect and ACME-challenge passthrough are NOT replicated here --
## ingress-nginx already force-redirects to HTTPS by default, and this cluster
## has no cert-manager/ACME HTTP-01 solver (certs are provisioned manually).
server {
    listen 8080;
    server_name tekeche.com www.tekeche.com;
    root /usr/share/nginx/html;
    index index.html;

    location = /privacy {
        rewrite ^ /confidentialite.html last;
    }

    location = /delete-account {
        rewrite ^ /suppression-compte.html last;
    }

    error_page 404 /404.html;
    error_page 500 502 503 504 /500.html;

    location / {
        try_files $uri $uri/ =404;
    }
}
