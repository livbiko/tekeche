## Mirrors livbiko.com's live IIS web.config reverse-proxy rules (checked
## 2026-07-18): /api/* and /socket.io/* forwarded to tekeche-api. In
## production this path is only ever hit by bot scans probing for secrets
## (e.g. /api/.env, all 403) -- no legitimate traffic found in IIS logs --
## but it's replicated here for exact parity with the live site rather than
## silently dropped.
server {
    listen 8080;
    server_name livbiko.com www.livbiko.com;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://tekeche-api.tekeche.svc.cluster.local:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /socket.io/ {
        proxy_pass http://tekeche-api.tekeche.svc.cluster.local:5000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
